name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend solution
        run: dotnet restore ./ZyntraPay.slnx

      - name: Build backend solution
        run: dotnet build ./ZyntraPay.slnx --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test ./ZyntraPay.slnx --configuration Release --no-build --verbosity normal
